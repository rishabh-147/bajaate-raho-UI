<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- Title -->
    <title>Bajaate Raho | Self-Hosted Internet Radio</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Bajaate Raho is a lightweight self-hosted Internet Radio built with Spring Boot and React. Stream your own music library with seamless HTTP Range Streaming."
    />

    <meta
      name="keywords"
      content="Bajaate Raho, Internet Radio, Music Streaming, Spring Boot, React, Java, HTTP Range, Self Hosted, Audio Streaming"
    />

    <meta name="author" content="Rishabh Tiwari" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="%PUBLIC_URL%/assets/favicon.svg"
    />

    <!-- Apple -->
    <link
      rel="apple-touch-icon"
      href="%PUBLIC_URL%/assets/logo.svg"
    />

    <!-- Manifest -->
    <link
      rel="manifest"
      href="%PUBLIC_URL%/manifest.json"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Bajaate Raho"
    />

    <meta
      property="og:description"
      content="A lightweight self-hosted Internet Radio built with Spring Boot and React."
    />

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:image"
      content="%PUBLIC_URL%/assets/logo.svg"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Bajaate Raho"
    />

    <meta
      name="twitter:description"
      content="Stream your own music library with HTTP Range Streaming."
    />

    <meta
      name="twitter:image"
      content="%PUBLIC_URL%/assets/logo.svg"
    />
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to use Bajaate Raho.
    </noscript>

    <div id="root"></div>
  </body>
</html>
